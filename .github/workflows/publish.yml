name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write # Required for pub.dev OIDC publishing

jobs:
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter urdu-tools typecheck

      - name: Test
        run: pnpm --filter urdu-tools test

      - name: Build
        run: pnpm --filter urdu-tools build

      - name: Publish to npmjs.org
        run: pnpm --filter urdu-tools publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-nuget:
    name: Publish NuGet → GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore packages/urdu-dotnet/UrduTools.Core/UrduTools.Core.csproj

      - name: Test
        run: dotnet test packages/urdu-dotnet/UrduTools.Core.Tests/UrduTools.Core.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack packages/urdu-dotnet/UrduTools.Core/UrduTools.Core.csproj -c Release -o ./nupkg

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

  publish-dart:
    name: Publish Dart to pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get
        working-directory: packages/urdu-dart

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        working-directory: packages/urdu-dart

      - name: Analyze project source
        run: dart analyze
        working-directory: packages/urdu-dart

      - name: Run tests
        run: dart test
        working-directory: packages/urdu-dart

      - name: Publish to pub.dev
        run: dart pub publish --force
        working-directory: packages/urdu-dart

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-nuget]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install & build JS
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter urdu-tools build

      - name: Pack npm tarball
        run: |
          cd packages/urdu-js
          pnpm pack
          mv *.tgz ../../urdu-tools-${{ github.ref_name }}.tgz

      - name: Pack NuGet
        run: dotnet pack packages/urdu-dotnet/UrduTools.Core/UrduTools.Core.csproj -c Release -o ./nupkg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            urdu-tools-${{ github.ref_name }}.tgz
            nupkg/*.nupkg
