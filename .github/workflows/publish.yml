name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  publish-npm:
    name: Publish npm → GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@iamahsanmehmood'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @iamahsanmehmood/urdu-tools typecheck

      - name: Test
        run: pnpm --filter @iamahsanmehmood/urdu-tools test

      - name: Build
        run: pnpm --filter @iamahsanmehmood/urdu-tools build

      - name: Publish to GitHub Packages
        run: pnpm --filter @iamahsanmehmood/urdu-tools publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-nuget:
    name: Publish NuGet → GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore packages/urdu-dotnet/UrduTools.Core/UrduTools.Core.csproj

      - name: Test
        run: dotnet test packages/urdu-dotnet/UrduTools.Core.Tests/UrduTools.Core.Tests.csproj -c Release

      - name: Pack
        run: dotnet pack packages/urdu-dotnet/UrduTools.Core/UrduTools.Core.csproj -c Release -o ./nupkg

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/iamahsanmehmood/index.json" \
            --name github \
            --username iamahsanmehmood \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source github --skip-duplicate

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-nuget]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install & build JS
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @iamahsanmehmood/urdu-tools build

      - name: Pack npm tarball
        run: |
          cd packages/urdu-js
          pnpm pack
          mv *.tgz ../../iamahsanmehmood-urdu-tools-${{ github.ref_name }}.tgz

      - name: Pack NuGet
        run: dotnet pack packages/urdu-dotnet/UrduTools.Core/UrduTools.Core.csproj -c Release -o ./nupkg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            iamahsanmehmood-urdu-tools-${{ github.ref_name }}.tgz
            nupkg/*.nupkg
