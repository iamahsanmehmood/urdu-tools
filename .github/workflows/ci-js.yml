name: CI — JS

on:
  push:
    branches: [main]
    paths:
      - 'packages/urdu-js/**'
      - '.github/workflows/ci-js.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/urdu-js/**'
      - '.github/workflows/ci-js.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @urdu-tools/core typecheck
      - run: pnpm --filter @urdu-tools/core test:coverage
      - run: pnpm --filter @urdu-tools/core build
