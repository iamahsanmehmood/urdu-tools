name: CI — .NET

on:
  push:
    branches: [main]
    paths:
      - 'packages/urdu-dotnet/**'
      - '.github/workflows/ci-dotnet.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/urdu-dotnet/**'
      - '.github/workflows/ci-dotnet.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore packages/urdu-dotnet/UrduTools.Core.Tests/UrduTools.Core.Tests.csproj
      - name: Build
        run: dotnet build packages/urdu-dotnet/UrduTools.Core.Tests/UrduTools.Core.Tests.csproj --no-restore -c Release
      - name: Test
        run: dotnet test packages/urdu-dotnet/UrduTools.Core.Tests/UrduTools.Core.Tests.csproj --no-build -c Release --collect:"XPlat Code Coverage"
